### Render Blueprint — one-click deploy
### After import: set TELEGRAM_TOKEN and CHAT_ID in the service's Environment tab.
### Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: alfaview
    runtime: node
    plan: free                # change to "starter" ($7/mo) for persistent disk + no sleep
    region: oregon            # change if you prefer fra/sgp/etc.
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_TOKEN
        sync: false           # set in dashboard (secret)
      - key: CHAT_ID
        sync: false           # set in dashboard (secret)
      - key: AUTO_INTERVAL_SEC
        value: "30"           # how often to re-scan the market
      - key: KEEPALIVE
        value: "1"            # self-ping every 10 min (prevents free-tier sleep)
      - key: DATA_DIR
        value: /var/data      # persistent disk mount (uncomment disk block below for paid plan)
    # Uncomment for paid plans to persist positions/history across deploys:
    # disk:
    #   name: alfaview-data
    #   mountPath: /var/data
    #   sizeGB: 1
